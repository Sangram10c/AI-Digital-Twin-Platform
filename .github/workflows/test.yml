name: Test

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/backend/**'
      - 'apps/frontend/**'
      - 'packages/**'

env:
  NODE_VERSION: '22'

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [apps/frontend, apps/backend]
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_digital_twin_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install all dependencies
        run: npm ci

      - name: Generate Prisma client
        if: matrix.project == 'apps/backend'
        working-directory: apps/backend
        run: npx prisma generate

      - name: Run tests
        working-directory: ${{ matrix.project }}
        run: npm run test -- --coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_digital_twin_test?schema=public
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret
