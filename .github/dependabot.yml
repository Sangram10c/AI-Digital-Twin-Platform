version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'chore(deps):'

  - package-ecosystem: 'npm'
    directory: '/apps/frontend'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
      - 'frontend'
    commit-message:
      prefix: 'chore(deps-frontend):'

  - package-ecosystem: 'npm'
    directory: '/apps/backend'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
      - 'backend'
    commit-message:
      prefix: 'chore(deps-backend):'

  - package-ecosystem: 'docker'
    directory: '/infra/docker'
    schedule:
      interval: 'monthly'
    labels:
      - 'dependencies'
      - 'docker'
    commit-message:
      prefix: 'chore(deps-docker):'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    labels:
      - 'dependencies'
      - 'ci'
    commit-message:
      prefix: 'chore(deps-ci):'
